<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="تفصيل كنب وستائر" style="max-width:340px;width:100%;height:auto;display:block">
  <style>
    .curtain-l { transform: translateX(100px); animation: openL 1.8s cubic-bezier(.55,.1,.25,1) .3s forwards; }
    .curtain-r { transform: translateX(-100px); animation: openR 1.8s cubic-bezier(.55,.1,.25,1) .3s forwards; }
    .chair { opacity: 0; transform: scale(.88); transform-origin: 250px 440px; animation: chairIn 1.4s cubic-bezier(.34,.1,.2,1.06) .9s forwards; }
    .chair-loop { transform-origin: 250px 440px; animation: breathe 4.5s ease-in-out 3s infinite; }
    .logo-text { opacity: 0; transform: translateY(-6px); animation: textIn 1s ease-out 1.6s forwards; }
    .glow { transform-origin: 250px 300px; animation: pulse 5s ease-in-out infinite; }
    @keyframes openL { to { transform: translateX(0); } }
    @keyframes openR { to { transform: translateX(0); } }
    @keyframes chairIn { to { opacity: 1; transform: scale(1); } }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.022); } }
    @keyframes textIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: .85; } }
    svg:hover .chair-loop { animation-duration: 2.4s; }
    @media (prefers-reduced-motion: reduce) {
      .curtain-l,.curtain-r,.chair,.chair-loop,.logo-text,.glow { animation: none; opacity: 1; transform: none; }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE3D4"/><stop offset="100%" stop-color="#FF9F86"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="58%" r="40%">
      <stop offset="0%" stop-color="#FFEED1" stop-opacity=".95"/><stop offset="100%" stop-color="#FFEED1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="curtG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B1421"/><stop offset="50%" stop-color="#D33449"/><stop offset="100%" stop-color="#6B0E18"/>
    </linearGradient>
    <linearGradient id="chairG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E63946"/><stop offset="60%" stop-color="#C81835"/><stop offset="100%" stop-color="#8B1421"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" rx="50" fill="url(#bg)"/>
  <ellipse class="glow" cx="250" cy="300" rx="155" ry="195" fill="url(#spot)"/>
  <rect x="35" y="50" width="430" height="8" rx="4" fill="#6B4A2A"/>
  <circle cx="42" cy="54" r="11" fill="#4A3320"/><circle cx="458" cy="54" r="11" fill="#4A3320"/>
  <g class="chair-loop"><g class="chair">
    <ellipse cx="250" cy="455" rx="105" ry="8" fill="#000" opacity=".18"/>
