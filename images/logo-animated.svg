    <path d="M165,210 Q170,260 175,330" stroke="#7B0E1A" stroke-width="2" fill="none" opacity=".4"/>
    <path d="M335,210 Q330,260 325,330" stroke="#7B0E1A" stroke-width="2" fill="none" opacity=".4"/>
    <path d="M140,270 Q135,260 145,255 Q160,255 165,265 L165,375 L135,375 Z" fill="#A41523"/>
    <path d="M360,270 Q365,260 355,255 Q340,255 335,265 L335,375 L365,375 Z" fill="#A41523"/>
    <path d="M150,330 L350,330 Q355,348 350,370 L150,370 Q145,348 150,330 Z" fill="#D02740"/>
    <path d="M160,344 Q250,352 340,344" stroke="#7B0E1A" stroke-width="1.5" fill="none" opacity=".45"/>
    <path d="M135,375 L365,375 L360,432 L140,432 Z" fill="#9D1421"/>
    <rect x="148" y="432" width="14" height="22" rx="2" fill="#5C4327"/>
    <rect x="338" y="432" width="14" height="22" rx="2" fill="#5C4327"/>
    <circle cx="222" cy="225" r="3.5" fill="#6B0E18"/><circle cx="278" cy="225" r="3.5" fill="#6B0E18"/>
    <circle cx="250" cy="255" r="3.5" fill="#6B0E18"/>
  </g></g>
  <g class="curtain-l">
    <path d="M35,58 L215,58 L215,290 Q200,295 195,280 Q190,300 175,290 Q170,310 155,300 Q150,320 135,310 Q130,330 115,320 Q110,340 95,330 Q90,350 75,340 Q70,360 55,350 Q50,370 35,360 Z" fill="url(#curtG)"/>
    <line x1="70" y1="60" x2="68" y2="345" stroke="#4F0810" stroke-width="2.5" opacity=".5"/>
