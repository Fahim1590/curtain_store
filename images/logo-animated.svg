    <line x1="140" y1="60" x2="138" y2="315" stroke="#4F0810" stroke-width="2.5" opacity=".5"/>
    <line x1="175" y1="60" x2="175" y2="295" stroke="#4F0810" stroke-width="2.5" opacity=".5"/>
    <line x1="88" y1="60" x2="85" y2="335" stroke="#F09BAA" stroke-width="1.5" opacity=".5"/>
    <line x1="158" y1="60" x2="157" y2="305" stroke="#F09BAA" stroke-width="1.5" opacity=".5"/>
    <ellipse cx="125" cy="305" rx="60" ry="13" fill="#F5EEDC"/>
    <ellipse cx="125" cy="305" rx="60" ry="13" fill="none" stroke="#C8BC9C" stroke-width="1.5"/>
  </g>
  <g class="curtain-r">
