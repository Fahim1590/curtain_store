    <line x1="430" y1="60" x2="432" y2="345" stroke="#4F0810" stroke-width="2.5" opacity=".5"/>
    <line x1="395" y1="60" x2="397" y2="325" stroke="#4F0810" stroke-width="2.5" opacity=".5"/>
    <line x1="360" y1="60" x2="362" y2="315" stroke="#4F0810" stroke-width="2.5" opacity=".5"/>
    <line x1="325" y1="60" x2="325" y2="295" stroke="#4F0810" stroke-width="2.5" opacity=".5"/>
    <line x1="412" y1="60" x2="415" y2="335" stroke="#F09BAA" stroke-width="1.5" opacity=".5"/>
    <line x1="342" y1="60" x2="343" y2="305" stroke="#F09BAA" stroke-width="1.5" opacity=".5"/>
    <ellipse cx="375" cy="305" rx="60" ry="13" fill="#F5EEDC"/>
    <ellipse cx="375" cy="305" rx="60" ry="13" fill="none" stroke="#C8BC9C" stroke-width="1.5"/>
  </g>
  <text class="logo-text" x="250" y="135" text-anchor="middle" font-family="'Tajawal','Cairo',system-ui,sans-serif" font-size="46" font-weight="900" fill="#FFFFFF" stroke="#5C0B14" stroke-width="2" paint-order="stroke fill">تفصيل كنب وستائر</text>
</svg>